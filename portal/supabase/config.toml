# Supabase CLI config for the Apex Advantage portal/CRM Edge Functions.
# Run `supabase link --project-ref <your-project-ref>` once before deploying.

[functions.create-free-account]
# Called by anonymous visitors during signup — no Supabase session exists
# yet, so platform-level JWT verification must be off or every request
# (including the CORS preflight) gets rejected before reaching the
# function's own code.
verify_jwt = false

[functions.create-checkout-session]
# Handles two purposes: unlocking Checkride Prep (caller is signed in —
# the function validates their access token itself, in code, via
# supabase.auth.getUser) and ground school registration (anonymous-
# friendly, same as the old cash-at-door flow). Platform-level JWT
# verification must stay off for both, or the CORS preflight itself gets
# rejected before either code path runs.
verify_jwt = false

[functions.stripe-webhook]
# Called directly by Stripe, authenticated via its own signature header
# (constructEventAsync), not a Supabase JWT.
verify_jwt = false

[functions.send-email]
# Every caller already carries a valid Supabase auth token: other Edge
# Functions invoke it with the service_role key (createClient(...).functions
# .invoke(...)), and the only browser callers are already-authenticated
# portal users (ground-school bulk messages, admin broadcasts, per-student
# admin emails). Verifying the JWT here (the platform default) costs
# nothing for those legitimate callers and closes off what would otherwise
# be a public, unauthenticated endpoint capable of sending arbitrary email
# from the apexaviationtx.com domain via the Resend account.

[functions.andrewos-metrics]
# Called on a daily schedule by pg_cron/pg_net (see
# functions/andrewos-metrics/schedule.sql), not by a signed-in user -- no
# Supabase session exists, so platform-level JWT verification must be
# off; auth is instead enforced in code via ANDREWOS_CRON_SECRET.
verify_jwt = false

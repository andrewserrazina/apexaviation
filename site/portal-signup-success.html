<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're In | Apex Advantage Portal</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse at top, #0f2340 0%, #080f1e 60%); padding: 24px; }
    .success-wrap { width: 100%; max-width: 460px; text-align: center; }
    .success-logo { display: flex; justify-content: center; margin-bottom: 28px; }
    .success-logo img { height: 42px; width: auto; }
    .success-card {
      background: #101f38; border: 1px solid rgba(255,255,255,0.09);
      border-radius: var(--radius-lg); padding: 44px 36px; box-shadow: var(--shadow-lg);
    }
    .success-emoji { font-size: 56px; margin-bottom: 16px; }
    .success-card h1 { font-size: 24px; font-weight: 800; color: #fff; margin-bottom: 12px; }
    .success-card p { color: rgba(255,255,255,0.6); font-size: 15px; line-height: 1.7; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="success-wrap">
    <a href="home.html" class="success-logo"><img src="apexwhite.png" alt="Apex Aviation" /></a>
    <div class="success-card">
      <div class="success-emoji">🎉</div>
      <h1>Payment received — welcome to Apex Advantage!</h1>
      <p>Check your email for a link to set your password and sign in to the member portal.</p>
      <p style="color:rgba(255,255,255,0.35);font-size:13px;margin-top:20px">Didn't get it in a minute or two? Check spam, or <a href="contact.html" style="color:var(--gold)">contact us</a>.</p>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set New Password | Apex Advantage Portal</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse at top, #0f2340 0%, #080f1e 60%); padding: 24px; }
    .login-wrap { width: 100%; max-width: 420px; }
    .login-logo { display: flex; justify-content: center; margin-bottom: 28px; }
    .login-logo img { height: 42px; width: auto; }
    .login-card {
      background: #101f38; border: 1px solid rgba(255,255,255,0.09);
      border-radius: var(--radius-lg); padding: 40px 36px; box-shadow: var(--shadow-lg);
    }
    .login-eyebrow {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 14px;
    }
    .login-card h1 { font-size: 24px; font-weight: 800; color: #fff; text-align: center; margin-bottom: 8px; }
    .login-card > p.sub { text-align: center; color: rgba(255,255,255,0.55); font-size: 14px; margin-bottom: 28px; line-height: 1.6; }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
    .form-group label { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.6); }
    .form-group input {
      padding: 13px 14px; border: 1.5px solid rgba(255,255,255,0.1); border-radius: 8px;
      font-family: var(--font); font-size: 15px; color: #fff; background: rgba(11,31,58,0.6);
      outline: none; transition: border-color var(--transition), box-shadow var(--transition);
    }
    .form-group input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(244,180,0,0.18); }
    .login-error {
      display: none; background: rgba(220,60,60,0.12); border: 1px solid rgba(220,60,60,0.35);
      color: #ff8b8b; font-size: 13px; font-weight: 600; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px;
    }
    .login-error.show { display: block; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <a href="home.html" class="login-logo"><img src="apexwhite.png" alt="Apex Aviation" /></a>
    <div class="login-card">
      <div class="login-eyebrow"><span>◆</span> Apex Advantage Member Portal</div>
      <h1>Set a new password.</h1>
      <p class="sub">Choose a new password for your account.</p>

      <div class="login-error" id="resetError"></div>

      <form id="resetForm" novalidate>
        <div class="form-group">
          <label for="password">New password</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" required minlength="6" />
        </div>
        <div class="form-group">
          <label for="confirm">Confirm password</label>
          <input type="password" id="confirm" placeholder="••••••••" autocomplete="new-password" required minlength="6" />
        </div>
        <button type="submit" class="btn btn--primary btn--full" id="resetSubmit">Set Password</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="portal-supabase.js"></script>
  <script>
    var form = document.getElementById('resetForm');
    var errorBox = document.getElementById('resetError');
    var submitBtn = document.getElementById('resetSubmit');

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      errorBox.classList.remove('show');
      var password = document.getElementById('password').value;
      var confirm = document.getElementById('confirm').value;

      if (password !== confirm) {
        errorBox.textContent = 'Passwords do not match.';
        errorBox.classList.add('show');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Saving…';
      apexSupabase.auth.updateUser({ password: password }).then(function (res) {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Set Password';
        if (res.error) {
          errorBox.textContent = res.error.message;
          errorBox.classList.add('show');
          return;
        }
        window.location.href = 'portal.html';
      });
    });
  </script>
</body>
</html>
